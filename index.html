<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* Eliminates default browser margins */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f2efea; /* Fallback color matching your image */
            /* background-image: url("/Relax\ and\ Roar\ Logo.png");
            background-size:     cover;                      /* <------ */
    background-repeat:   no-repeat;
    background-position: center center; */
        }

        /* The background image setup */
        .fullscreen-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover; /* This makes it feel the entire screen */
            z-index: -1;
           
        }

        /* Centered Text Styling */
        .content {
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        h1 {
            color: #b59a5d; /* Elegant gold matching the logo */
            font-family: 'Georgia', serif;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.8rem;
            margin: 0;
            padding: 20px;
            
            /* Responsive Font Sizing */
            font-size: 6vw; /* Default for PC */
            
            /* Modern semi-transparent shadow for legibility */
            text-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            
            animation: fadeIn 3s ease-in-out;
        }

        /* RESPONSIVE ADJUSTMENTS */

        /* Mobile Phones */
        @media (max-width: 600px) {
            h1 { 
                font-size: 10vw; 
                letter-spacing: 0.4rem;
            }
            .fullscreen-bg {
                background-size: contain; /* Prevents cropping the logo on skinny screens */
            }
        }

        /* Tablets */
        @media (min-width: 601px) and (max-width: 1024px) {
            h1 { font-size: 8vw; }
        }

        /* Smart Watches */
        @media (max-width: 280px) {
            h1 { 
                font-size: 12vw; 
                letter-spacing: 0.1rem;
            }
        }

        /* 4K TV / Large Screens */
        @media (min-width: 2500px) {
            h1 { font-size: 4vw; }
        }

        /* Smooth Entry Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div class="fullscreen-bg"></div>

    <!-- Centered Text Layer -->
    <div class="content">
        
        <h1 style="margin-top: %;">Relax and Roar</h1>
        <h1 style="font-size: 20px;">Coming Soon</h1>
    </div>

</body>
</html>
